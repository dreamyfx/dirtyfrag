name: Build dirtyfrag (Static)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install required packages for static linking
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc g++ musl-tools
        
    - name: Clone dirtyfrag repository
      run: git clone https://github.com/V4bel/dirtyfrag.git
      
    - name: Build dirtyfrag with static linking
      run: |
        cd dirtyfrag
        musl-gcc -O0 -Wall -static -o exp exp.c -lutil
        strip exp
        
    - name: Upload built binary
      uses: actions/upload-artifact@v4
      with:
        name: dirtyfrag-binary
        path: dirtyfrag/exp
