name: Build dirtyfrag (Compatible)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Install older GCC for compatibility
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-9 g++-9
        
    - name: Clone dirtyfrag repository
      run: git clone https://github.com/V4bel/dirtyfrag.git
      
    - name: Build dirtyfrag with compatibility flags
      run: |
        cd dirtyfrag
        gcc-9 -O0 -Wall -o exp exp.c -lutil -static-libgcc
        strip exp
        
    - name: Upload built binary
      uses: actions/upload-artifact@v3
      with:
        name: dirtyfrag-binary
        path: dirtyfrag/exp
